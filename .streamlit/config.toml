[theme]
base                     = "dark"
primaryColor             = "#CFB991"
backgroundColor          = "#08080f"
secondaryBackgroundColor = "#0f0f1a"
textColor                = "#c0c8d8"
font                     = "monospace"

[server]
headless                    = true
enableCORS                  = false
enableXsrfProtection        = false
enableWebsocketCompression  = false

[browser]
gatherUsageStats = false
